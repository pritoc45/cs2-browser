<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>CS2 Ultimate Hub</title>
    <style>
        :root {
            --accent: #ff9d00;
            --panel-bg: rgba(10, 10, 10, 0.9);
        }

        body {
            margin: 0; padding: 0;
            background: #000 center/cover fixed no-repeat;
            color: white; font-family: 'Segoe UI', sans-serif;
            display: flex; flex-direction: column; align-items: center; min-height: 100vh;
        }

        body.bg-image::before {
            content: ''; position: fixed; inset: 0;
            background: rgba(0, 0, 0, 0.5); z-index: -1;
        }

        /* Часы */
        .clock { text-align: center; margin: 40px 0 20px; }
        #time { font-size: 72px; font-weight: 900; line-height: 1; }
        #date { color: var(--accent); text-transform: uppercase; letter-spacing: 2px; font-size: 14px; }

        /* Поиск и Подсказки */
        .search-wrapper { width: 90%; max-width: 450px; position: relative; margin-bottom: 30px; z-index: 100; }
        
        input[type="text"] {
            width: 100%; padding: 18px; border: 2px solid var(--accent);
            background: var(--panel-bg); color: white; border-radius: 15px;
            font-size: 18px; outline: none; box-sizing: border-box; backdrop-filter: blur(10px);
            transition: border-radius 0.2s;
        }

        #suggestions {
            position: absolute; top: 100%; left: 0; right: 0;
            background: var(--panel-bg); border: 2px solid var(--accent);
            border-top: none; border-radius: 0 0 15px 15px;
            display: none; overflow: hidden; backdrop-filter: blur(10px);
        }

        .sugg-item {
            padding: 12px 20px; border-bottom: 1px solid rgba(255,255,255,0.1);
            cursor: pointer; font-size: 16px;
        }
        .sugg-item:last-child { border-bottom: none; }
        .sugg-item:active { background: var(--accent); color: black; }

        /* Плитки */
        .grid {
            display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px;
            width: 95%; max-width: 500px; padding-bottom: 100px;
        }
        .tile {
            background: var(--panel-bg); border-left: 4px solid var(--accent);
            border-radius: 8px; padding: 20px 10px; text-decoration: none;
            color: white; text-align: center; position: relative; backdrop-filter: blur(5px);
        }
        .tile-name { font-weight: bold; color: var(--accent); }
        
        /* Кнопки управления */
        .controls { position: fixed; bottom: 20px; display: flex; gap: 10px; z-index: 101; }
        .btn {
            background: var(--accent); color: black; border: none;
            padding: 12px 18px; border-radius: 30px; font-weight: bold; font-size: 18px;
        }

        /* Настройки */
        #modal {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: #111; padding: 25px; border-radius: 15px;
            border: 2px solid var(--accent); display: none; z-index: 200; width: 85%;
        }
        .field { margin-bottom: 15px; }
        .field label { display: block; font-size: 12px; color: var(--accent); margin-bottom: 5px; }
        .bg-switch { display: flex; gap: 10px; margin-bottom: 10px; }
        .sw-btn { flex: 1; padding: 8px; background: #222; color: #999; border-radius: 5px; text-align: center; }
        .sw-btn.active { background: var(--accent); color: black; }
        .delete-btn { position: absolute; top: -5px; right: -5px; background: red; color: white; border-radius: 50%; width: 22px; height: 22px; border: none; display: none; }
        .edit-mode .delete-btn { display: block; }
    </style>
</head>
<body>

    <div class="clock">
        <div id="time">00:00</div>
        <div id="date">...</div>
    </div>

    <div class="search-wrapper">
        <form id="searchForm" action="https://www.google.com/search" method="GET">
            <input type="text" id="searchInput" name="q" placeholder="Поиск в Google..." autocomplete="off">
            <div id="suggestions"></div>
        </form>
    </div>

    <div id="grid" class="grid"></div>

    <div class="controls">
        <button class="btn" onclick="toggleEdit()">✎</button>
        <button class="btn" onclick="openSettings()">⚙</button>
        <button class="btn" onclick="addTile()">+</button>
    </div>

    <div id="modal">
        <h3>Настройки</h3>
        <div class="field">
            <label>Тип фона</label>
            <div class="bg-switch">
                <div id="swImg" class="sw-btn" onclick="setMode('image')">Картинка</div>
                <div id="swSld" class="sw-btn" onclick="setMode('solid')">Цвет</div>
            </div>
        </div>
        <div id="fileField" class="field">
            <label>Загрузить фон</label>
            <input type="file" accept="image/*" onchange="upload(this)">
        </div>
        <div class="field">
            <label>Основной цвет</label>
            <input type="color" id="cp" onchange="changeCol(this.value)" style="width:100%">
        </div>
        <button class="btn" style="width:100%" onclick="closeSettings()">Закрыть</button>
    </div>

    <script>
        let config = JSON.parse(localStorage.getItem('cs2_final_v1')) || {
            accent: '#ff9d00', bgMode: 'image', bgImg: '',
            links: [{name: 'AYUGRAM', url: 'https://t.me'}, {name: 'FACEIT', url: 'https://faceit.com'}]
        };

        const searchInput = document.getElementById('searchInput');
        const suggBox = document.getElementById('suggestions');

        // ГЛАВНАЯ ФУНКЦИЯ ПОДСКАЗОК
        searchInput.addEventListener('input', () => {
            const query = searchInput.value;
            if (query.length < 2) {
                suggBox.style.display = 'none';
                searchInput.style.borderRadius = "15px";
                return;
            }

            const script = document.createElement('script');
            script.src = `https://suggestqueries.google.com/complete/search?client=firefox&q=${encodeURIComponent(query)}&callback=showSugg`;
            document.body.appendChild(script);
            document.body.removeChild(script);
        });

        window.showSugg = (data) => {
            const results = data[1];
            if (results.length > 0) {
                suggBox.innerHTML = '';
                results.slice(0, 6).forEach(text => {
                    const div = document.createElement('div');
                    div.className = 'sugg-item';
                    div.textContent = text;
                    div.onclick = () => {
                        searchInput.value = text;
                        document.getElementById('searchForm').submit();
                    };
                    suggBox.appendChild(div);
                });
                suggBox.style.display = 'block';
                searchInput.style.borderRadius = "15px 15px 0 0";
            } else {
                suggBox.style.display = 'none';
                searchInput.style.borderRadius = "15px";
            }
        };

        // Закрытие подсказок при клике мимо
        document.addEventListener('click', (e) => {
            if (e.target !== searchInput) {
                suggBox.style.display = 'none';
                searchInput.style.borderRadius = "15px";
            }
        });

        function render() {
            document.documentElement.style.setProperty('--accent', config.accent);
            if (config.bgMode === 'image' && config.bgImg) {
                document.body.style.backgroundImage = `url(${config.bgImg})`;
                document.body.classList.add('bg-image');
            } else {
                document.body.style.backgroundImage = 'none';
                document.body.style.backgroundColor = config.bgMode === 'solid' ? config.accent : '#000';
                document.body.classList.remove('bg-image');
            }
            const grid = document.getElementById('grid');
            grid.innerHTML = '';
            config.links.forEach((l, i) => {
                const d = document.createElement('div');
                d.className = 'tile';
                d.innerHTML = `<button class="delete-btn" onclick="removeLink(${i})">×</button>
                <a href="${l.url}" style="text-decoration:none;color:white"><span class="tile-name">${l.name}</span></a>`;
                grid.appendChild(d);
            });
            document.getElementById('swImg').className = config.bgMode === 'image' ? 'sw-btn active' : 'sw-btn';
            document.getElementById('swSld').className = config.bgMode === 'solid' ? 'sw-btn active' : 'sw-btn';
            document.getElementById('fileField').style.display = config.bgMode === 'image' ? 'block' : 'none';
        }

        function upload(el) {
            const reader = new FileReader();
            reader.onload = (e) => { config.bgImg = e.target.result; save(); render(); };
            reader.readAsDataURL(el.files[0]);
        }
        function setMode(m) { config.bgMode = m; save(); render(); }
        function changeCol(v) { config.accent = v; save(); render(); }
        function addTile() { 
            const n = prompt('Имя:'); const u = prompt('URL:', 'https://');
            if(n && u) { config.links.push({name:n, url:u}); save(); render(); }
        }
        function removeLink(i) { config.links.splice(i,1); save(); render(); }
        function toggleEdit() { document.body.classList.toggle('edit-mode'); }
        function openSettings() { document.getElementById('modal').style.display = 'block'; }
        function closeSettings() { document.getElementById('modal').style.display = 'none'; }
        function save() { localStorage.setItem('cs2_final_v1', JSON.stringify(config)); }

        function tick() {
            const n = new Date();
            document.getElementById('time').innerText = n.getHours().toString().padStart(2,'0') + ':' + n.getMinutes().toString().padStart(2,'0');
            document.getElementById('date').innerText = n.toLocaleDateString('ru-RU', {weekday:'long', day:'numeric', month:'long'});
        }
        setInterval(tick, 1000); tick(); render();
    </script>
</body>
</html>
