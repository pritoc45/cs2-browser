<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CS2 Tactical Hub</title>
    <style>
        :root {
            --accent: #ff9d00;
            --text-color: #ffffff;
            --panel-bg: rgba(15, 15, 15, 0.95);
        }

        body {
            margin: 0; padding: 0;
            background: #000 center/cover fixed no-repeat;
            color: var(--text-color);
            font-family: 'Segoe UI', Roboto, sans-serif;
            display: flex; flex-direction: column; align-items: center; min-height: 100vh;
        }

        body.bg-image::before {
            content: ''; position: fixed; inset: 0;
            background: rgba(0, 0, 0, 0.5); z-index: -1;
        }

        /* Часы */
        .clock { text-align: center; margin: 30px 0 15px; }
        #time { font-size: 80px; font-weight: 900; line-height: 1; color: var(--text-color); }
        #date { color: var(--accent); text-transform: uppercase; letter-spacing: 3px; font-size: 14px; margin-top: 5px; }

        /* Поиск */
        .search-wrapper { width: 92%; max-width: 500px; position: relative; margin-bottom: 25px; }
        input[type="text"] {
            width: 100%; padding: 18px 25px; border: 2px solid var(--accent);
            background: var(--panel-bg); color: var(--text-color); border-radius: 12px;
            font-size: 18px; outline: none; box-sizing: border-box; backdrop-filter: blur(10px);
        }

        #suggestions {
            position: absolute; top: 100%; left: 0; right: 0;
            background: var(--panel-bg); border: 2px solid var(--accent); border-top: none;
            display: none; z-index: 100; border-radius: 0 0 12px 12px;
        }
        .sugg-item { padding: 12px; border-bottom: 1px solid rgba(255,255,255,0.1); color: var(--text-color); }

        /* ПЛИТОЧНЫЙ ДИЗАЙН */
        .grid {
            display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px;
            width: 95%; max-width: 550px; padding-bottom: 100px;
        }
        .tile {
            background: var(--panel-bg);
            aspect-ratio: 1 / 1;
            border: 1px solid rgba(255,255,255,0.1);
            border-bottom: 3px solid var(--accent);
            border-radius: 8px;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            text-decoration: none; position: relative; transition: transform 0.1s;
        }
        .tile:active { transform: scale(0.92); background: rgba(255,255,255,0.05); }
        .tile-icon { font-size: 24px; margin-bottom: 8px; color: var(--accent); font-weight: bold; }
        .tile-name { font-size: 12px; font-weight: 800; text-transform: uppercase; text-align: center; color: var(--text-color); padding: 0 5px; }

        /* Кнопки управления плитки в режиме редактирования */
        .tile-controls {
            position: absolute; top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.8); display: none; 
            grid-template-columns: 1fr 1fr; grid-template-rows: 1fr 1fr; gap: 2px; padding: 5px;
        }
        .edit-mode .tile-controls { display: grid; }
        .ctrl-btn { border: none; background: var(--accent); color: #000; font-weight: bold; font-size: 10px; border-radius: 4px; }
        .btn-del { background: #ff4444; color: white; }

        /* Панель кнопок внизу */
        .bottom-nav { position: fixed; bottom: 20px; display: flex; gap: 15px; z-index: 101; }
        .main-btn {
            background: var(--accent); color: #000; border: none;
            width: 55px; height: 55px; border-radius: 50%; font-size: 24px; font-weight: bold;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }

        /* Модалка настроек */
        #settingsModal {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: #111; padding: 20px; border-radius: 15px;
            border: 2px solid var(--accent); display: none; z-index: 200; width: 85%; max-width: 350px;
        }
        .option-group { margin-bottom: 15px; }
        .option-group label { display: block; font-size: 11px; color: var(--accent); margin-bottom: 5px; text-transform: uppercase; }
        .option-group input[type="color"] { width: 100%; height: 35px; border: none; background: none; }
    </style>
</head>
<body>

    <div class="clock">
        <div id="time">00:00</div>
        <div id="date">...</div>
    </div>

    <div class="search-wrapper">
        <form id="searchForm" action="https://www.google.com/search" method="GET">
            <input type="text" id="searchInput" name="q" placeholder="Поиск в Google..." autocomplete="off">
            <div id="suggestions"></div>
        </form>
    </div>

    <div id="grid" class="grid"></div>

    <div class="bottom-nav">
        <button class="main-btn" onclick="toggleEdit()">✎</button>
        <button class="main-btn" onclick="openSettings()">⚙</button>
        <button class="main-btn" onclick="addTile()">+</button>
    </div>

    <div id="settingsModal">
        <h3 style="margin:0 0 15px">Настройки дизайна</h3>
        <div class="option-group">
            <label>Цвет плиток и акцентов</label>
            <input type="color" id="accentPicker" onchange="updateColors()">
        </div>
        <div class="option-group">
            <label>Цвет текста и времени</label>
            <input type="color" id="textPicker" onchange="updateColors()">
        </div>
        <div class="option-group">
            <label>Фон (картинка)</label>
            <input type="file" accept="image/*" onchange="uploadBg(this)" style="font-size: 10px">
        </div>
        <button class="main-btn" style="width:100%; border-radius: 10px; height: 40px; font-size: 14px" onclick="closeSettings()">Готово</button>
    </div>

    <script>
        let config = JSON.parse(localStorage.getItem('cs2_hub_v5')) || {
            accent: '#ff9d00',
            textColor: '#ffffff',
            bg: '',
            links: [
                {name: 'AyuGram', url: 'https://t.me'},
                {name: 'Faceit', url: 'https://faceit.com'},
                {name: 'HLTV', url: 'https://hltv.org'},
                {name: 'Market', url: 'https://steamcommunity.com/market/search?appid=730'},
                {name: 'Nades', url: 'https://cs2nades.com'}
            ]
        };

        function save() { localStorage.setItem('cs2_hub_v5', JSON.stringify(config)); }

        function render() {
            document.documentElement.style.setProperty('--accent', config.accent);
            document.documentElement.style.setProperty('--text-color', config.textColor);
            if(config.bg) {
                document.body.style.backgroundImage = `url(${config.bg})`;
                document.body.classList.add('bg-image');
            }
            
            const grid = document.getElementById('grid');
            grid.innerHTML = '';
            config.links.forEach((link, i) => {
                const item = document.createElement('div');
                item.className = 'tile';
                item.innerHTML = `
                    <div class="tile-icon">${link.name.charAt(0)}</div>
                    <div class="tile-name">${link.name}</div>
                    <a href="${link.url}" style="position:absolute;inset:0;z-index:1"></a>
                    <div class="tile-controls" style="z-index:2">
                        <button class="ctrl-btn" onclick="move(${i}, -1)">←</button>
                        <button class="ctrl-btn" onclick="move(${i}, 1)">→</button>
                        <button class="ctrl-btn btn-del" onclick="del(${i})" style="grid-column: span 2">УДАЛИТЬ</button>
                    </div>
                `;
                grid.appendChild(item);
            });
            document.getElementById('accentPicker').value = config.accent;
            document.getElementById('textPicker').value = config.textColor;
        }

        function move(index, step) {
            let newIndex = index + step;
            if (newIndex >= 0 && newIndex < config.links.length) {
                let temp = config.links[index];
                config.links[index] = config.links[newIndex];
                config.links[newIndex] = temp;
                save(); render();
            }
        }

        function del(i) { config.links.splice(i, 1); save(); render(); }
        
        function updateColors() {
            config.accent = document.getElementById('accentPicker').value;
            config.textColor = document.getElementById('textPicker').value;
            save(); render();
        }

        function uploadBg(el) {
            const reader = new FileReader();
            reader.onload = (e) => { config.bg = e.target.result; save(); render(); };
            reader.readAsDataURL(el.files[0]);
        }

        function addTile() {
            const name = prompt('Название:');
            const url = prompt('URL:', 'https://');
            if(name && url) { config.links.push({name, url}); save(); render(); }
        }

        function toggleEdit() { document.body.classList.toggle('edit-mode'); }
        function openSettings() { document.getElementById('settingsModal').style.display = 'block'; }
        function closeSettings() { document.getElementById('settingsModal').style.display = 'none'; }

        // Поиск (скрипт из прошлого шага)
        const searchInput = document.getElementById('searchInput');
        const suggBox = document.getElementById('suggestions');
        searchInput.addEventListener('input', () => {
            if (searchInput.value.length < 2) { suggBox.style.display = 'none'; return; }
            const script = document.createElement('script');
            script.src = `https://suggestqueries.google.com/complete/search?client=firefox&q=${encodeURIComponent(searchInput.value)}&callback=showSugg`;
            document.body.appendChild(script);
            document.body.removeChild(script);
        });
        window.showSugg = (data) => {
            suggBox.innerHTML = '';
            data[1].slice(0, 5).forEach(t => {
                const d = document.createElement('div'); d.className = 'sugg-item'; d.textContent = t;
                d.onclick = () => { searchInput.value = t; document.getElementById('searchForm').submit(); };
                suggBox.appendChild(d);
            });
            suggBox.style.display = 'block';
        };

        function tick() {
            const n = new Date();
            document.getElementById('time').innerText = n.getHours().toString().padStart(2,'0') + ':' + n.getMinutes().toString().padStart(2,'0');
            document.getElementById('date').innerText = n.toLocaleDateString('ru-RU', {weekday:'long', day:'numeric', month:'long'});
        }
        setInterval(tick, 1000); tick(); render();
    </script>
</body>
</html>
